name: DevOps AI Pipeline

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
    
    - name: Set up Docker Build
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/ai-devops-app:${{ github.sha }} .

    - name: Push Docker Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/ai-devops-app:${{ github.sha }}

    - name: Configure AWS
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1

    - name: Update kubeconfig
      run: aws eks update-kubeconfig --name ai-devops-cluster --region ap-south-1

    - name: Deploy to EKS
      run: |
        kubectl set image deployment/ai-devops-app ai-devops-container=${{ secrets.DOCKER_USERNAME }}/ai-devops-app:${{ github.sha }}

    - name: Install Python Dependencies
      if: failure()
      run: |
        python -m pip install --upgrade pip
        pip install openai

    - name: Run AI Analyzer if Pipeline Fails
      if: failure()
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: |
        echo "Collecting logs..."
        python ai-log-analyzer/analyze_logs.py build.log
