apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: ai-devops-alerts
  namespace: monitoring
  labels:
    release: monitoring
spec:
  groups:
  - name: ai-devops-app-alerts
    rules:
    - alert: PodCrashLooping
      expr: increase(kube_pod_container_status_restarts_total[5m]) > 3
      for: 2m
      labels:
        severity: warning
      annotations:
        summary: Pod restarting frequently
        description: A pod is restarting more than 3 times in 5 minutes.
